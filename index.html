<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost AI | منصة التصميم الذكية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; margin: 0; }
        .ai-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        
        /* تصميم الملصق بحدود بيضاء احترافية */
        .sticker-frame {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 8px solid white; 
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin: 20px auto;
            position: relative;
        }
        
        .loader { 
            border: 4px solid #1e293b; border-top: 4px solid #06b6d4; 
            border-radius: 50%; width: 30px; height: 30px; 
            animation: spin 1s linear infinite; display: inline-block; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8">

    <div class="max-w-md w-full space-y-6">
        <header class="text-center">
            <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">BrandBoost AI</h1>
            <p class="text-slate-400 text-sm mt-2">نظام توليد الهوية والملصقات المتعدد</p>
        </header>

        <div class="ai-card p-6 rounded-3xl shadow-xl">
            <input type="text" id="brandInput" placeholder="أدخل اسم مشروعك (مثلاً: كابلن)..." 
                class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-cyan-500 outline-none text-center text-xl mb-4 text-white">
            
            <button onclick="generateWithMultiAI()" id="aiBtn"
                class="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg">
                توليد بالذكاء الاصطناعي 🚀
            </button>
        </div>

        <div id="loadingStatus" class="hidden text-center space-y-3">
            <div class="loader"></div>
            <p class="text-cyan-400 animate-pulse text-sm">جاري تجربة أفضل محركات AI...</p>
        </div>

        <div id="resultArea" class="hidden space-y-8 pb-12">
            
            <div class="space-y-4">
                <h3 class="text-center text-slate-400 text-sm font-bold">نموذج الهوية المقترح:</h3>
                <div class="rounded-3xl overflow-hidden border-2 border-slate-700 aspect-square bg-slate-900 shadow-2xl">
                    <img id="aiImage" src="" class="w-full h-full object-cover">
                </div>
            </div>

            <div class="ai-card p-6 rounded-3xl text-center border-t-4 border-cyan-500">
                <h3 class="text-white font-bold mb-2">🎁 ملصقك الجاهز (Sticker)</h3>
                <div class="sticker-frame">
                    <span id="stickerText" class="text-white font-bold text-2xl drop-shadow-lg"></span>
                </div>
                <p class="text-slate-400 text-xs mt-4">تصميم بحدود بيضاء جاهز للاستخدام</p>
                <button onclick="alert('جاري تجهيز الصورة للتحميل...')" class="mt-4 bg-white/10 hover:bg-white/20 px-6 py-2 rounded-full text-xs transition">حفظ كـ PNG 📥</button>
            </div>

        </div>
    </div>

    <script>
        async function generateWithMultiAI() {
            const name = document.getElementById('brandInput').value;
            if(!name) return alert('يرجى إدخال الاسم أولاً!');

            const btn = document.getElementById('aiBtn');
            const img = document.getElementById('aiImage');
            const resultArea = document.getElementById('resultArea');
            const loader = document.getElementById('loadingStatus');
            const stickerText = document.getElementById('stickerText');

            // إعدادات البداية
            btn.disabled = true;
            loader.classList.remove('hidden');
            resultArea.classList.add('hidden');

            const seed = Math.floor(Math.random() * 100000);
            
            // قائمة المحركات للمداورة في حال التعطل
            const engines = [
                `https://image.pollinations.ai/prompt/professional-minimalist-logo-for-${name}-high-quality?seed=${seed}&nologo=true`, 
                `https://picsum.photos/seed/${seed}/800/800`
            ];

            let currentEngine = 0;

            function tryEngine() {
                if (currentEngine < engines.length) {
                    img.src = engines[currentEngine];
                    currentEngine++;
                } else {
                    alert('جميع المحركات مشغولة، حاول مجدداً');
                    btn.disabled = false;
                    loader.classList.add('hidden');
                }
            }

            // تنفيذ المحاولة الأولى
            tryEngine();

            img.onload = () => {
                loader.classList.add('hidden');
                resultArea.classList.remove('hidden');
                stickerText.innerText = name;
                btn.disabled = false;
                // سحب الصفحة للأسفل لرؤية النتيجة
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };

            img.onerror = () => {
                console.log("المحرك الحالي مشغول، جاري الانتقال للمحرك التالي...");
                tryEngine();
            };
        }
    </script>
</body>
</html>
