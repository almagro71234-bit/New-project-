<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost AI | ابتكار الهوية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #111827 0%, #1f2937 100%); }
    </style>
</head>
<body class="gradient-bg text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="max-w-xl w-full text-center space-y-8 animate-fade-in">
        <div class="space-y-2">
            <h1 class="text-5xl font-extrabold bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
                BrandBoost AI
            </h1>
            <p class="text-gray-400 text-lg">مستشارك الذكي لبناء العلامات التجارية</p>
        </div>

        <div class="bg-gray-800/50 p-8 rounded-3xl border border-gray-700 backdrop-blur-sm shadow-2xl">
            <div class="space-y-6">
                <div>
                    <label class="block text-right mb-2 text-sm text-gray-400">اسم مشروعك الناشئ</label>
                    <input type="text" id="brandName" placeholder="اكتب اسم البراند هنا..." 
                        class="w-full p-4 rounded-xl bg-gray-900 border border-gray-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/20 outline-none text-center text-xl transition-all">
                </div>
                
                <button onclick="generateIdea()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all transform hover:scale-[1.02] active:scale-95 shadow-lg shadow-blue-900/30">
                    توليد الهوية البصرية ✨
                </button>
            </div>

            <div id="result" class="hidden mt-8 pt-6 border-t border-gray-700">
                <div class="flex items-center justify-center space-x-3 space-x-reverse">
