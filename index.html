<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost AI | المنصة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; transition: background 1s ease; }
        .gradient-bg { background: #0f172a; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .color-card { height: 40px; width: 100%; border-radius: 8px; margin-bottom: 5px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body id="mainBody" class="gradient-bg text-white min-h-screen flex flex-col items-center p-4">

    <div class="max-w-2xl w-full space-y-6 mt-4">
        <h1 class="text-4xl font-extrabold text-center bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">BrandBoost AI</h1>
        
        <div class="bg-slate-800/60 p-6 rounded-3xl border border-slate-700 backdrop-blur-xl shadow-2xl">
            <div class="space-y-4">
                <input type="text" id="brandName" placeholder="ما هو اسم مشروعك؟" 
                    class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-cyan-500 outline-none text-center text-xl shadow-inner">
                
                <div class="flex gap-2 justify-center">
                    <button onclick="setStyle('modern')" class="style-btn px-4 py-2 rounded-full bg-slate-700 text-xs hover:bg-cyan-600 transition">✨ عصري</button>
                    <button onclick="setStyle('classic')" class="style-btn px-4 py-2 rounded-full bg-slate-700 text-xs hover:bg-amber-600 transition">🏛️ كلاسيكي</button>
                    <button onclick="setStyle('playful')" class="style-btn px-4 py-2 rounded-full bg-slate-700 text-xs hover:bg-pink-600 transition">🎨 مرح</button>
                </div>

                <button onclick="generateBranding()" 
                    class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg active:scale-95">
                    ابتكار الهوية الذكية 🚀
                </button>
            </div>

            <div id="resultArea" class="hidden mt-8 space-y-6 text-right fade-in">
                
                <div class="rounded-2xl overflow-hidden border-2 border-slate-600 shadow-2xl h-60 bg-slate-900">
                    <img id="brandImage" src="" alt="Brand Preview" class="w-full h-full object-cover">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-slate-900/80 p-4 rounded-2xl border border-slate-700">
                        <span class="text-cyan-400 text-xs block mb-3 font-bold uppercase">🎨 باليت الألوان المقترحة</span>
                        <div class="grid grid-cols-3 gap-2" id="colorContainer"></div>
                    </div>
                    <div class="bg-slate-900/80 p-4 rounded-2xl border border-slate-700">
                        <span class="text-purple-400 text-xs block mb-3 font-bold uppercase">✒️ الخط العربي المقترح</span>
                        <p id="fontSuggestion" class="text-white font-bold text-lg"></p>
                    </div>
                </div>

                <div class="bg-slate-900/80 p-5 rounded-2xl border border-slate-700 text-center">
                    <span class="text-yellow-400 text-sm block mb-1 font-bold italic">📝 الشعار اللفظي</span>
                    <p id="sloganText" class="text-white text-2xl font-bold italic"></p>
                </div>

                <button onclick="shareOnWhatsApp()" class="w-full bg-green-600 py-3 rounded-xl font-bold shadow-lg">مشاركة عبر واتساب 📱</button>
            </div>
        </div>
    </div>

    <script>
        let selectedStyle = 'modern';

        function setStyle(style) {
            selectedStyle = style;
            const body = document.getElementById('mainBody');
            if(style === 'modern') body.style.background = '#0f172a';
            if(style === 'classic') body.style.background = '#2d1b0d';
            if(style === 'playful') body.style.background = '#2e0f2a';
            alert('تم اختيار النمط!');
        }

        function generateBranding() {
            const name = document.getElementById('brandName').value;
            if(!name) return alert('أدخل اسم المشروع!');

            const resultArea = document.getElementById('resultArea');
            const colorContainer = document.getElementById('colorContainer');
            const randomId = Math.floor(Math.random() * 1000);
            
            // 1. تحديث الصورة
            document.getElementById('brandImage').src = `https://loremflickr.com/800/600/${encodeURIComponent(name)},${selectedStyle}?random=${randomId}`;
            
            // 2. تحديث الألوان بناءً على النمط
            let colors = [];
            let font = "";
            if(selectedStyle === 'modern') {
                colors = ['#06b6d4', '#3b82f6', '#f8fafc'];
                font = "Tajawal (عصري)";
            } else if(selectedStyle === 'classic') {
                colors = ['#b45309', '#78350f', '#fef3c7'];
                font = "Amiri (كلاسيكي فخم)";
            } else {
                colors = ['#ec4899', '#8b5cf6', '#fbbf24'];
                font = "Cairo (مرح وحيوي)";
            }

            colorContainer.innerHTML = colors.map(c => `<div><div class="color-card" style="background:${c}"></div><span class="text-[10px]">${c}</span></div>`).join('');
            document.getElementById('fontSuggestion').innerText = font;
            document.getElementById('sloganText').innerText = `"${name}: خيارك الأول للتميز"`;

            resultArea.classList.remove('hidden');
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }

        function shareOnWhatsApp() {
            const name = document.getElementById('brandName').value;
            const text = `صممت هوية مشروعي "${name}" عبر BrandBoost AI! ✨\nرابط الموقع: ${window.location.href}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
