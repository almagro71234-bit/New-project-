<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost AI | ابتكار الهوية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; }
        .ai-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #06b6d4; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <div class="max-w-md w-full space-y-6">
        <h1 class="text-3xl font-bold text-center text-cyan-400">BrandBoost AI 🤖</h1>
        
        <div class="ai-card p-6 rounded-3xl shadow-2xl">
            <label class="block mb-2 text-sm text-slate-400">اسم المشروع أو وصفه:</label>
            <input type="text" id="brandInput" placeholder="مثلاً: كابلن، شمس، مطعم حديث..." 
                class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-cyan-500 outline-none text-center mb-4 text-white">
            
            <button onclick="generateWithAI()" id="aiBtn"
                class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 py-4 rounded-2xl font-bold transition-transform active:scale-95 shadow-lg">
                توليد بالذكاء الاصطناعي 🚀
            </button>
        </div>

        <div id="aiResult" class="hidden space-y-4 animate-fade-in">
            <div id="loadingStatus" class="flex items-center justify-center gap-3 text-cyan-400">
                <div class="loader"></div>
                <span>الذكاء الاصطناعي يصمم الآن...</span>
            </div>
            
            <div class="rounded-3xl overflow-hidden border-2 border-slate-700 shadow-2xl bg-slate-900 aspect-square">
                <img id="aiImage" src="" class="w-full h-full object-cover hidden">
            </div>
            
            <div class="ai-card p-4 rounded-2xl text-center">
                <p id="aiSlogan" class="font-bold text-lg text-white"></p>
                <p class="text-slate-400 text-xs mt-1 italic">تم إنشاء هذا التصميم بواسطة خوارزميات AI</p>
            </div>
        </div>
    </div>

    <script>
        async function generateWithAI() {
            const name = document.getElementById('brandInput').value;
            if(!name) return alert('يرجى إدخال اسم المشروع أولاً');

            const btn = document.getElementById('aiBtn');
            const resultDiv = document.getElementById('aiResult');
            const img = document.getElementById('aiImage');
            const loader = document.getElementById('loadingStatus');
            const slogan = document.getElementById('aiSlogan');

            // إعداد الواجهة للتحميل
            btn.disabled = true;
            btn.innerText = 'جاري المعالجة...';
            resultDiv.classList.remove('hidden');
            img.classList.add('hidden');
            loader.classList.remove('hidden');

            // إنشاء رقم عشوائي لضمان صورة جديدة في كل مرة
            const seed = Math.floor(Math.random() * 100000);
            
            // رابط محرك الذكاء الاصطناعي (Pollinations AI)
            const prompt = `professional minimalist logo for ${name}, high quality, vector style, clean background`;
            const aiUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?seed=${seed}&width=1024&height=1024&nologo=true`;

            img.src = aiUrl;

            img.onload = () => {
                loader.classList.add('hidden');
                img.classList.remove('hidden');
                slogan.innerText = name + " | الابتكار يبدأ من هنا";
                btn.disabled = false;
                btn.innerText = 'توليد بالذكاء الاصطناعي 🚀';
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };

            img.onerror = () => {
                alert('عذراً، المحرك مشغول حالياً. حاول مجدداً بعد ثوانٍ.');
                btn.disabled = false;
                btn.innerText = 'توليد بالذكاء الاصطناعي 🚀';
                loader.classList.add('hidden');
            };
        }
    </script>
</body>
</html>
