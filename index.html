<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرر الهوية الذكي | Brand Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; }
        .editor-card { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255,255,255,0.1); }
        #stickerPreview {
            width: 200px; height: 200px;
            transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center;
            text-align: center; cursor: move;
        }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="max-w-4xl w-full grid grid-cols-1 md:grid-cols-2 gap-6 mt-4">
        
        <div class="editor-card p-6 rounded-3xl space-y-6">
            <h2 class="text-xl font-bold text-cyan-400 border-b border-slate-700 pb-2">🛠️ أدوات التعديل</h2>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs text-slate-400 mb-1">الاسم على التصميم:</label>
                    <input type="text" id="nameInput" oninput="updateDesign()" placeholder="اكتب الاسم..." 
                        class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 outline-none">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">لون الخلفية:</label>
                        <input type="color" id="bgColor" oninput="updateDesign()" value="#06b6d4" class="w-full h-10 rounded-lg cursor-pointer bg-transparent">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">لون النص:</label>
                        <input type="color" id="textColor" oninput="updateDesign()" value="#ffffff" class="w-full h-10 rounded-lg cursor-pointer bg-transparent">
                    </div>
                </div>

                <div>
                    <label class="block text-xs text-slate-400 mb-1">حجم الخط:</label>
                    <input type="range" id="fontSize" oninput="updateDesign()" min="10" max="80" value="30" class="w-full accent-cyan-500">
                </div>

                <div>
                    <label class="block text-xs text-slate-400 mb-1">شكل الملصق:</label>
                    <select id="borderRadius" onchange="updateDesign()" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm">
                        <option value="50%">دائري (Sticker)</option>
                        <option value="20px">مربع زوايا ناعمة</option>
                        <option value="0px">مربع حاد</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs text-slate-400 mb-1">سماكة الحدود البيضاء:</label>
                    <input type="range" id="borderWidth" oninput="updateDesign()" min="0" max="20" value="8" class="w-full accent-cyan-500">
                </div>
            </div>

            <button onclick="window.print()" class="w-full bg-cyan-600 hover:bg-cyan-500 py-3 rounded-xl font-bold transition-all shadow-lg mt-4">
                حفظ التصميم النهائي 📥
            </button>
        </div>

        <div class="flex flex-col items-center justify-center bg-slate-900/50 rounded-3xl p-10 border-2 border-dashed border-slate-700 min-h-[400px]">
            <p class="text-xs text-slate-500 mb-4 font-bold">معاينة التصميم الحية</p>
            
            <div id="stickerPreview" style="background-color: #06b6d4; border: 8px solid white; border-radius: 50%;">
                <span id="textPreview" style="color: white; font-size: 30px; font-weight: bold;">اسمك هنا</span>
            </div>

            <div class="mt-10 text-center">
                <p class="text-slate-400 text-xs">يمكن للمستخدم تعديل كل شيء في الجهة اليمنى وتظهر النتائج هنا فوراً.</p>
            </div>
        </div>

    </div>

    <script>
        function updateDesign() {
            const name = document.getElementById('nameInput').value || "اسمك هنا";
            const bg = document.getElementById('bgColor').value;
            const textCol = document.getElementById('textColor').value;
            const size = document.getElementById('fontSize').value;
            const radius = document.getElementById('borderRadius').value;
            const borderW = document.getElementById('borderWidth').value;

            // تحديث العناصر في المعاينة
            const sticker = document.getElementById('stickerPreview');
            const text = document.getElementById('textPreview');

            text.innerText = name;
            text.style.fontSize = size + "px";
            text.style.color = textCol;

            sticker.style.backgroundColor = bg;
            sticker.style.borderRadius = radius;
            sticker.style.borderWidth = borderW + "px";
            sticker.style.borderColor = "#ffffff"; // حدود بيضاء للملصق
            sticker.style.borderStyle = "solid";
        }
    </script>
</body>
</html>
