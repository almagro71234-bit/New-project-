<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost AI | ابتكار الهوية والملصقات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* تصميم الملصق بحدود بيضاء احترافية */
        .sticker-style {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 6px solid white; /* الحدود البيضاء للملصق */
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            position: relative;
            margin: 20px auto;
        }
        .sticker-style::after {
            content: ''; position: absolute; inset: -10px;
            border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 50%;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="max-w-md w-full space-y-6 mt-8">
        <header class="text-center">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">BrandBoost AI</h1>
            <p class="text-slate-400 text-sm mt-2">ابتكار الهوية والملصقات الذكية</p>
        </header>

        <div class="bg-slate-800/50 p-6 rounded-3xl border border-slate-700 backdrop-blur-md shadow-xl">
            <input type="text" id="brandName" placeholder="أدخل اسم مشروعك..." 
                class="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 focus:border-cyan-500 outline-none text-center text-xl mb-4 text-white">
            
            <button onclick="generateEverything()" id="genBtn"
                class="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-xl font-bold shadow-lg transition-all active:scale-95">
                توليد الهوية والملصق 🚀
            </button>
        </div>

        <div id="resultArea" class="hidden fade-in space-y-6 pb-10">
            <div class="rounded-2xl overflow-hidden border-2 border-slate-700 aspect-square bg-slate-900">
                <img id="brandImage" src="" class="w-full h-full object-cover">
            </div>

            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-center">
                <h3 class="text-cyan-400 font-bold mb-4">🎁 ملصقك الجاهز (Sticker)</h3>
                <div id="stickerCircle" class="sticker-style">
                    <span id="stickerText" class="text-white font-bold text-2xl drop-shadow-md"></span>
                </div>
                <p class="text-slate-400 text-xs mt-4">جاهز للطباعة أو الاستخدام الرقمي</p>
                <button onclick="alert('جاري تجهيز الصورة للتحميل...')" class="mt-4 bg-white/10 hover:bg-white/20 px-4 py-2 rounded-full text-xs transition">حفظ كـ PNG 📥</button>
            </div>
        </div>
    </div>

    <script>
        function generateEverything() {
            const name = document.getElementById('brandName').value;
            if(!name) return alert('يرجى كتابة الاسم!');

            const btn = document.getElementById('genBtn');
            const result = document.getElementById('resultArea');
            const img = document.getElementById('brandImage');
            const stickerText = document.getElementById('stickerText');

            btn.disabled = true;
            btn.innerText = 'جاري الابتكار...';

            // توليد صورة الهوية
            const seed = Math.floor(Math.random() * 5000);
            img.src = `https://picsum.photos/seed/${seed}/800/800`;

            img.onload = () => {
                result.classList.remove('hidden');
                stickerText.innerText = name;
                btn.disabled = false;
                btn.innerText = 'توليد الهوية والملصق 🚀';
                result.scrollIntoView({ behavior: 'smooth' });
            };
        }
    </script>
</body>
</html>
