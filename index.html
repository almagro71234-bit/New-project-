<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost AI | ابتكار الهوية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="gradient-bg text-white min-h-screen flex flex-col items-center p-6">

    <div class="max-w-2xl w-full text-center space-y-8 mt-6">
        <h1 class="text-5xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent italic">BrandBoost AI</h1>
        
        <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700 backdrop-blur-md shadow-2xl">
            <div class="space-y-4">
                <input type="text" id="brandName" placeholder="اكتب تخصصك (مثلاً: قهوة، عقارات، ملابس)..." 
                    class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-cyan-500 outline-none text-center text-xl transition-all shadow-inner">
                <button onclick="generateBranding()" 
                    class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg active:scale-95 text-lg">
                    ابتكار الهوية البصرية ✨
                </button>
            </div>

            <div id="resultArea" class="hidden mt-8 space-y-6 text-right fade-in">
                
                <div class="rounded-2xl overflow-hidden border-2 border-slate-600 shadow-2xl group relative h-64 bg-slate-900">
                    <img id="brandImage" src="" alt="Brand Preview" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex items-end p-4">
                        <p class="text-sm font-light text-gray-300">نموذج هوية بصرية مقترح لـ <span id="dynamicName" class="text-cyan-400 font-bold"></span></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div class="bg-slate-900/80 p-5 rounded-2xl border border-slate-700 shadow-lg">
                        <span class="text-cyan-400 text-sm block mb-2 font-bold">💡 فكرة التصميم</span>
                        <p id="logoIdea" class="text-gray-200 leading-relaxed"></p>
                    </div>
                    <div class="bg-slate-900/80 p-5 rounded-2xl border border-slate-700 shadow-lg text-center">
                        <span class="text-yellow-400 text-sm block mb-2 font-bold">📝 الشعار اللفظي</span>
                        <p id="sloganText" class="text-white text-xl font-bold italic"></p>
                    </div>
                </div>
            </div>
        </div>
        
        <p class="text-slate-500 text-xs">نظام ذكاء اصطناعي تجريبي - 2026</p>
    </div>

    <script>
        function generateBranding() {
            const name = document.getElementById('brandName').value;
            if(!name) return alert('يرجى إدخال تخصص مشروعك!');

            const resultArea = document.getElementById('resultArea');
            const brandImage = document.getElementById('brandImage');
            const dynamicName = document.getElementById('dynamicName');
            
            // رابط الصورة المحسن لضمان التحميل السريع
            brandImage.src = `https://images.unsplash.com/photo-1511467687858-23d96c32e4ae?auto=format&fit=crop&q=80&w=800&sig=${Math.random()}`; // صورة افتراضية راقية
            // إذا أراد المستخدم البحث عن صورة دقيقة:
            brandImage.src = `https://source.unsplash.com/800x600/?${encodeURIComponent(name)},branding`;

            dynamicName.innerText = name;
            document.getElementById('logoIdea').innerText = `تصميم يعتمد على مبدأ التبسيط (Minimalism) مع دمج رموز تعبر عن "${name}" بلمسة تقنية حديثة تناسب السوق العالمي.`;
            document.getElementById('sloganText').innerText = `"${name}: بصمتك الفريدة في عالم الإبداع"`;

            resultArea.classList.remove('hidden');
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
