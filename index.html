<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost Studio | النسخة الشاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Amiri:wght@700&family=Reem+Kufi:wght@700&family=Aref+Ruqaa:wght@700&family=Lalezar&family=Vibes&family=Lemonada:wght@700&family=Pacifico&family=Monoton&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #010409; color: white; }
        .editor-card { background: rgba(13, 17, 23, 0.9); border: 1px solid #30363d; border-radius: 2rem; }
        #canvas { width: 100%; min-height: 480px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 2rem; position: relative; transition: 0.3s; overflow: hidden; }
        .bg-transparent-grid { background-image: radial-gradient(#d1d5db 1px, transparent 1px); background-size: 20px 20px; background-color: #ffffff; }
        input[type="range"] { accent-color: #22d3ee; }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-4">
            <div class="editor-card p-6 shadow-2xl">
                <h2 class="text-xl font-black text-cyan-400 mb-6 flex items-center gap-2">💎 استوديو التصميم المتكامل</h2>
                
                <label class="text-[11px] text-slate-500 mb-2 block font-bold">اسم العلامة التجارية:</label>
                <input type="text" id="brandText" oninput="render()" placeholder="اكتب الاسم هنا..." 
                    class="w-full p-4 rounded-2xl bg-black border border-slate-800 outline-none mb-4 text-center text-xl text-cyan-400 font-bold">

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="text-[11px] text-slate-500 mb-2 block font-bold">نوع المخطوطة:</label>
                        <select id="fontSelect" onchange="render()" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm outline-none">
                            <option value="'Aref Ruqaa'">خط الرقعة</option>
                            <option value="'Lalezar'">خط لاليزار</option>
                            <option value="'Reem Kufi'">الخط الكوفي</option>
                            <option value="'Lemonada'">خط ليمونادة</option>
                            <option value="'Vibes'">توقيع يدوي</option>
                            <option value="'Pacifico'">خط Pacifico</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] text-slate-500 mb-2 block font-bold">إضافة رمز (Icon):</label>
                        <select id="iconSelect" onchange="render()" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-sm outline-none">
                            <option value="">بدون رمز</option>
                            <option value="👑">👑 تاج</option>
                            <option value="💎">💎 ألماس</option>
                            <option value="🚀">🚀 انطلاق</option>
                            <option value="✒️">✒️ ريشة</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="space-y-2">
                        <label class="text-[11px] text-slate-500 block font-bold">حجم الخط:</label>
                        <input type="range" id="fontSize" oninput="render()" min="30" max="150" value="80" class="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] text-slate-500 block font-bold">لون النص:</label>
                        <input type="color" id="textColor" oninput="render()" value="#ff0000" class="w-full h-10 bg-transparent cursor-pointer rounded-lg border border-slate-700">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="text-[11px] text-slate-500 mb-2 block font-bold">تأثير النص:</label>
                        <select id="effectSelect" onchange="render()" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-xs">
                            <option value="none">عادي</option>
                            <option value="glow">إشعاع (Glow)</option>
                            <option value="outline">مفرغ (Outline)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[11px] text-slate-500 mb-2 block font-bold">الخلفية:</label>
                        <select id="bgSelect" onchange="render()" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-xs">
                            <option value="white">أبيض ناصع</option>
                            <option value="transparent">شفاف ✨</option>
                            <option value="linear-gradient(45deg, #0f172a, #334155)">داكن ملكي</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-3 pt-4 border-t border-slate-800">
                    <button onclick="downloadPNG()" class="w-full bg-cyan-600 hover:bg-cyan-500 p-4 rounded-2xl font-black shadow-xl transition-all">تحميل الهوية (PNG) 📥</button>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-700 p-3 rounded-xl text-xs font-bold border border-slate-700 font-bold">حفظ كملف PDF</button>
                        <button onclick="copyText()" class="bg-slate-800 hover:bg-slate-700 p-3 rounded-xl text-xs font-bold border border-slate-700 font-bold">نسخ كـ نص</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7">
            <div id="canvas" class="bg-white shadow-2xl border-4 border-slate-900/10">
                <div id="logoContent" class="flex flex-col items-center p-12 text-center transition-all">
                    <span id="iconOut" class="text-7xl mb-4"></span>
                    <span id="textOut" class="font-black leading-tight">اسم العلامة</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function render() {
            const text = document.getElementById('brandText').value || "اسم العلامة";
            const font = document.getElementById('fontSelect').value;
            const icon = document.getElementById('iconSelect').value;
            const size = document.getElementById('fontSize').value;
            const color = document.getElementById('textColor').value;
            const bg = document.getElementById('bgSelect').value;
            const effect = document.getElementById('effectSelect').value;

            const canvas = document.getElementById('canvas');
            const tOut = document.getElementById('textOut');
            const iOut = document.getElementById('iconOut');

            tOut.innerText = text;
            tOut.style.fontFamily = font;
            tOut.style.fontSize = size + "px";
            iOut.innerText = icon;
            iOut.style.color = color;

            if (bg === 'transparent') {
                canvas.className = "bg-transparent-grid";
                canvas.style.background = "";
            } else if (bg.includes('gradient')) {
                canvas.className = "";
                canvas.style.background = bg;
            } else {
                canvas.className = "bg-white";
                canvas.style.background = "#ffffff";
            }

            tOut.style.textShadow = effect === 'glow' ? `0 0 15px ${color}, 0 0 30px ${color}` : 'none';
            tOut.style.webkitTextStroke = effect === 'outline' ? `2px ${color}` : '0px';
            tOut.style.color = effect === 'outline' ? "transparent" : color;
        }

        async function downloadPNG() {
            const el = document.getElementById('canvas');
            const bg = document.getElementById('bgSelect').value;
            const canvasRes = await html2canvas(el, { 
                backgroundColor: bg === 'transparent' ? null : (bg.includes('gradient') ? null : "#ffffff"),
                scale: 4 
            });
            const a = document.createElement('a');
            a.download = 'BrandLogo.png';
            a.href = canvasRes.toDataURL();
            a.click();
        }

        function copyText() {
            const val = document.getElementById('brandText').value || "اسم العلامة";
            navigator.clipboard.writeText(`✧ ${val} ✧`);
            alert("تم نسخ النص!");
        }

        render();
    </script>
</body>
</html>
