<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost AI | ابتكار الهوية بالذكاء الاصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; transition: background 0.8s ease; }
        .gradient-bg { background: #0f172a; }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .color-card { height: 35px; width: 100%; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        #brandImage { transition: all 0.5s ease; filter: grayscale(100%) blur(5px); }
        #brandImage.loaded { filter: grayscale(0%) blur(0px); }
    </style>
</head>
<body id="mainBody" class="gradient-bg text-white min-h-screen flex flex-col items-center p-4">

    <div class="max-w-2xl w-full space-y-6 mt-4">
        <header class="text-center space-y-2">
            <h1 class="text-4xl font-extrabold bg-gradient-to-r from-cyan-400 to-purple-500 bg-clip-text text-transparent">BrandBoost AI</h1>
            <p class="text-slate-400 text-sm">توليد هويات بصرية فريدة باستخدام الذكاء الاصطناعي</p>
        </header>
        
        <div class="bg-slate-800/60 p-6 rounded-3xl border border-slate-700 backdrop-blur-xl shadow-2xl">
            <div class="space-y-4">
                <input type="text" id="brandName" placeholder="ما هو اسم أو نشاط مشروعك؟" 
                    class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-cyan-500 outline-none text-center text-xl shadow-inner transition-all">
                
                <div class="flex gap-2 justify-center">
                    <button onclick="setStyle('modern', 'minimalist professional logo, vector art, flat design, tech blue')" class="px-4 py-2 rounded-full bg-slate-700 text-xs hover:bg-cyan-600 transition">✨ عصري</button>
                    <button onclick="setStyle('classic', 'luxury elegant logo, gold and black, vintage ornament, high quality')" class="px-4 py-2 rounded-full bg-slate-700 text-xs hover:bg-amber-600 transition">🏛️ كلاسيكي</button>
                    <button onclick="setStyle('creative', 'creative artistic logo, colorful, abstract shape, vibrant')" class="px-4 py-2 rounded-full bg-slate-700 text-xs hover:bg-purple-600 transition">🎨 إبداعي</button>
                </div>

                <button onclick="generateAIBranding()" id="genBtn"
                    class="w-full bg-gradient-to-r from-cyan-600 to-purple-600 hover:from-cyan-500 hover:to-purple-500 text-white font-bold py-4 rounded-2xl transition-all active:scale-95 shadow-lg text-lg">
                    توليد الهوية بالذكاء الاصطناعي 🤖
                </button>
            </div>

            <div id="resultArea" class="hidden mt-8 space-y-6 text-right fade-in">
                <div class="relative rounded-2xl overflow-hidden border-2 border-slate-600 shadow-2xl h-80 bg-slate-900">
                    <div id="aiLoader" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900 z-10">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-cyan-500 mb-4"></div>
                        <p class="text-cyan-400 text-sm animate-pulse">الذكاء الاصطناعي يرسم هويتك الآن...</p>
                    </div>
                    <img id="brandImage" src="" alt="AI Generated Logo" class="w-full h-full object-cover">
                </div>

                <div class="bg-slate-900/80 p-5 rounded-2xl border border-slate-700">
                    <span class="text-cyan-400 text-xs font-bold block mb-2">💡 تحليل الذكاء الاصطناعي للمشروع:</span>
                    <p id="aiDescription" class="text-slate-300 text-sm leading-relaxed"></p>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-slate-900/80 p-4 rounded-2xl border border-slate-700">
                        <span class="text-purple-400 text-xs font-bold block mb-3">🎨 باليت الألوان الذكية</span>
                        <div class="grid grid-cols-3 gap-2" id="colorContainer"></div>
                    </div>
                    <div class="bg-slate-900/80 p-4 rounded-2xl border border-slate-700 text-center flex flex-col justify-center">
                        <span class="text-yellow-400 text-xs font-bold block mb-2">📝 الشعار اللفظي (AI)</span>
                        <p id="sloganText" class="text-white font-bold text-lg italic"></p>
                    </div>
                </div>

                <button onclick="location.reload()" class="w-full border border-slate-600 py-3 rounded-xl font-bold hover:bg-slate-700 transition">إعادة المحاولة بتصميم مختلف 🔄</button>
            </div>
        </div>
    </div>

    <script>
        let currentPrompt = 'professional logo, vector art, minimalist';

        function setStyle(style, prompt) {
            currentPrompt = prompt;
            const body = document.getElementById('mainBody');
            if(style === 'modern') body.style.background = '#0f172a';
            if(style === 'classic') body.style.background = '#1e1b4b';
            if(style === 'creative') body.style.background = '#312e81';
        }

        async function generateAIBranding() {
            const name = document.getElementById('brandName').value;
            if(!name) return alert('يرجى وصف مشروعك أولاً');

            const btn = document.getElementById('genBtn');
            const resultArea = document.getElementById('resultArea');
            const img = document.getElementById('brandImage');
            const loader = document.getElementById('aiLoader');

            btn.disabled = true;
            btn.innerText = 'جاري التوليد...';
            resultArea.classList.remove('hidden');
            loader.classList.remove('hidden');
            img.classList.remove('loaded');

            // بناء الـ Prompt للذكاء الاصطناعي
            const seed = Math.floor(Math.random() * 100000);
            const finalPrompt = `Professional high-quality logo for a project named "${name}", ${currentPrompt}, 4k, clean background`;
            
            // رابط توليد الصور بالذكاء الاصطناعي (Pollinations)
            const aiUrl = `https://pollinations.ai/p/${encodeURIComponent(finalPrompt)}?width=1024&height=1024&seed=${seed}&model=flux`;

            img.src = aiUrl;

            img.onload = () => {
                loader.classList.add('hidden');
                img.classList.add('loaded');
                btn.disabled = false;
                btn.innerText = 'توليد الهوية بالذكاء الاصطناعي 🤖';
                
                // تحديث البيانات المصاحبة
                document.getElementById('aiDescription').innerText = `تم توليد هذا التصميم بناءً على تحليل اسم "${name}". يركز الذكاء الاصطناعي على البساطة لضمان سهولة التعرف على العلامة التجارية في مختلف المنصات الرقمية.`;
                document.getElementById('sloganText').innerText = `"${name}: حيث يلتقي الذكاء بالإبداع"`;
                
                // توليد ألوان ذكية عشوائية متناسقة
                const colors = ['#06b6d4', '#8b5cf6', '#ffffff'];
                document.getElementById('colorContainer').innerHTML = colors.map(c => `<div><div class="color-card" style="background:${c}"></div><span class="text-[10px]">${c}</span></div>`).join('');
                
                resultArea.scrollIntoView({ behavior: 'smooth' });
            };
        }
    </script>
</body>
</html>
