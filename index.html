<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost Typography | محرك الخطوط العالمي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Amiri:wght@700&family=Almarai:wght@800&family=Reem+Kufi:wght@700&family=Pacifico&family=Monoton&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }
        .editor-glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .canvas-display { background: white; width: 100%; min-height: 350px; border-radius: 2.5rem; display: flex; align-items: center; justify-content: center; position: relative; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow: hidden; }
        .text-main { transition: all 0.3s ease; line-height: 1.2; text-align: center; padding: 20px; }
        /* زخارف إضافية */
        .deco-line { width: 60px; height: 4px; background: currentColor; border-radius: 10px; margin: 10px auto; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-6">
            <div class="editor-glass p-8 rounded-[2.5rem] shadow-2xl">
                <h2 class="text-2xl font-black text-cyan-400 mb-6">🎨 مصمم المخطوطات الذكي</h2>
                
                <div class="space-y-4">
                    <input type="text" id="brandText" oninput="render()" placeholder="اكتب الاسم (عربي أو English)..." 
                        class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none focus:border-cyan-500 text-lg">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] text-slate-400 mb-2 block">نوع الخط:</label>
                            <select id="fontFamily" onchange="render()" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-xs">
                                <optgroup label="عربي">
                                    <option value="'Cairo', sans-serif">كاييرو (عصري)</option>
                                    <option value="'Almarai', sans-serif">المراعي (ناعم)</option>
                                    <option value="'Reem Kufi', sans-serif">ريم كوفي (تراثي)</option>
                                    <option value="'Amiri', serif">أميري (كلاسيكي)</option>
                                </optgroup>
                                <optgroup label="English/Artistic">
                                    <option value="'Pacifico', cursive">Pacifico (انسيابي)</option>
                                    <option value="'Monoton', cursive">Monoton (تكنولوجي)</option>
                                    <option value="serif">Classic Serif</option>
                                </optgroup>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] text-slate-400 mb-2 block">نمط الزخرفة:</label>
                            <select id="decoStyle" onchange="render()" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-700 text-xs">
                                <option value="none">بدون زخرفة</option>
                                <option value="stars">✧ نجوم ✧</option>
                                <option value="brackets">【 إطار 】</option>
                                <option value="lines">▬ خطوط ▬</option>
                                <option value="glow">توهج نيون</option>
                            </select>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <div class="flex-1">
                            <label class="text-[10px] text-slate-400 mb-2 block">اللون:</label>
                            <input type="color" id="textColor" oninput="render()" value="#0f172a" class="w-full h-10 bg-transparent cursor-pointer rounded-lg">
                        </div>
                        <div class="flex-1">
                            <label class="text-[10px] text-slate-400 mb-2 block">حجم الخط:</label>
                            <input type="range" id="fontSize" oninput="render()" min="30" max="120" value="60" class="w-full accent-cyan-500">
                        </div>
                    </div>
                </div>

                <button onclick="window.print()" class="w-full mt-8 bg-gradient-to-r from-cyan-600 to-blue-600 p-4 rounded-2xl font-bold shadow-xl hover:scale-[1.02] transition">تصدير المخطوطة بدقة عالية 📥</button>
            </div>
        </div>

        <div class="lg:col-span-7 flex flex-col items-center justify-center">
            <div id="canvas" class="canvas-display">
                <div id="textContainer" class="text-main">
                    <div id="decoTop" class="hidden text-xl mb-2 opacity-50">✧✧✧</div>
                    <span id="mainOutput">SHAMS</span>
                    <div id="decoBottom" class="hidden text-xl mt-2 opacity-50">✧✧✧</div>
                    <div id="decoLine" class="hidden deco-line"></div>
                </div>
            </div>
            <p class="mt-6 text-slate-500 text-xs">ملاحظة: يدعم هذا المحرك اللغة العربية والإنجليزية بشكل تلقائي وفوري.</p>
        </div>

    </div>

    <script>
        function render() {
            let input = document.getElementById('brandText').value || "SHAMS";
            const font = document.getElementById('fontFamily').value;
            const color = document.getElementById('textColor').value;
            const size = document.getElementById('fontSize').value;
            const deco = document.getElementById('decoStyle').value;

            const output = document.getElementById('mainOutput');
            const container = document.getElementById('textContainer');
            const top = document.getElementById('decoTop');
            const bottom = document.getElementById('decoBottom');
            const line = document.getElementById('decoLine');

            // إعدادات الخط والألوان
            output.innerText = input;
            container.style.fontFamily = font;
            container.style.color = color;
            output.style.fontSize = size + "px";

            // تصفير الزخارف
            top.classList.add('hidden');
            bottom.classList.add('hidden');
            line.classList.add('hidden');
            output.style.textShadow = "none";

            // تطبيق الزخرفة المختارة
            if (deco === "stars") {
                top.innerText = "✧✧✧";
                bottom.innerText = "✧✧✧";
                top.classList.remove('hidden');
                bottom.classList.remove('hidden');
            } else if (deco === "brackets") {
                output.innerText = `【 ${input} 】`;
            } else if (deco === "lines") {
                line.classList.remove('hidden');
                line.style.backgroundColor = color;
            } else if (deco === "glow") {
                output.style.textShadow = `0 0 20px ${color}`;
            }
        }

        // تشغيل الرندر لأول مرة
        render();
    </script>
</body>
</html>
