<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost Pro Export</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Amiri:wght@700&family=Almarai:wght@800&family=Reem+Kufi:wght@700&family=Aref+Ruqaa:wght@700&family=Lalezar&family=Vibes&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: white; }
        .editor-panel { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        /* منطقة العرض */
        #exportArea { 
            width: 100%; 
            min-height: 400px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 2rem; 
            transition: 0.3s;
            position: relative;
        }
        .bg-white { background-color: #ffffff; }
        .bg-transparent-checkered { 
            background-image: linear-gradient(45deg, #e5e7eb 25%, transparent 25%), linear-gradient(-45deg, #e5e7eb 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e5e7eb 75%), linear-gradient(-45deg, transparent 75%, #e5e7eb 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px 10px, 10px 0;
            background-color: #ffffff;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-5 space-y-4">
            <div class="editor-panel p-6 rounded-[2.5rem] shadow-2xl">
                <h2 class="text-xl font-black text-cyan-400 mb-4">⚙️ إعدادات التصدير</h2>
                
                <input type="text" id="brandText" oninput="render()" placeholder="اكتب الاسم هنا..." 
                    class="w-full p-4 rounded-2xl bg-slate-950 border border-slate-800 outline-none mb-4 text-center text-lg">

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <select id="fontFamily" onchange="render()" class="p-3 rounded-xl bg-slate-900 border border-slate-700 text-xs">
                        <option value="'Lalezar'">خط لاليزار</option>
                        <option value="'Aref Ruqaa'">خط الرقعة</option>
                        <option value="'Reem Kufi'">الخط الكوفي</option>
                        <option value="'Amiri'">الخط الأميري</option>
                        <option value="'Vibes'">خط التوقيع</option>
                    </select>
                    <select id="bgType" onchange="render()" class="p-3 rounded-xl bg-slate-900 border border-slate-700 text-xs">
                        <option value="white">خلفية بيضاء</option>
                        <option value="transparent">خلفية شفافة</option>
                    </select>
                </div>

                <input type="color" id="textColor" oninput="render()" value="#1e293b" class="w-full h-10 mb-6 bg-transparent cursor-pointer">

                <div class="space-y-2">
                    <button onclick="downloadImage()" class="w-full bg-cyan-600 hover:bg-cyan-500 p-3 rounded-xl font-bold flex items-center justify-center gap-2">
                        <span>تنزيل كصورة PNG</span>
                    </button>
                    <button onclick="window.print()" class="w-full bg-slate-800 hover:bg-slate-700 p-3 rounded-xl font-bold border border-slate-700">
                        <span>حفظ كملف PDF</span>
                    </button>
                    <button onclick="copyToClipboard()" class="w-full bg-slate-800 hover:bg-slate-700 p-3 rounded-xl font-bold border border-slate-700">
                        <span>نسخ النص المزخرف</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 flex flex-col items-center">
            <div id="exportArea" class="bg-white shadow-2xl">
                <div id="textOutput" style="font-size: 80px; color: #1e293b; text-align: center;">اسم البراند</div>
            </div>
            <p class="mt-4 text-slate-500 text-[10px]">المعاينة تظهر بدقة الشاشة، التنزيل سيكون بدقة عالية.</p>
        </div>
    </div>

    <script>
        function render() {
            const text = document.getElementById('brandText').value || "اسم البراند";
            const font = document.getElementById('fontFamily').value;
            const bg = document.getElementById('bgType').value;
            const color = document.getElementById('textColor').value;

            const area = document.getElementById('exportArea');
            const output = document.getElementById('textOutput');

            output.innerText = text;
            output.style.fontFamily = font;
            output.style.color = color;

            if (bg === "transparent") {
                area.className = "bg-transparent-checkered";
            } else {
                area.className = "bg-white";
            }
        }

        async function downloadImage() {
            const area = document.getElementById('exportArea');
            const bgType = document.getElementById('bgType').value;
            
            // إخفاء الشبكة إذا كانت الخلفية شفافة قبل التصوير
            if(bgType === "transparent") area.style.backgroundImage = "none";

            const canvas = await html2canvas(area, {
                backgroundColor: bgType === "transparent" ? null : "#ffffff",
                scale: 3 // جودة عالية جداً
            });

            const link = document.createElement('a');
            link.download = 'BrandLogo.png';
            link.href = canvas.toDataURL();
            link.click();
            
            render(); // إعادة الشبكة للمعاينة
        }

        function copyToClipboard() {
            const text = document.getElementById('brandText').value || "اسم البراند";
            const decorated = `✧ ${text} ✧`;
            navigator.clipboard.writeText(decorated);
            alert("تم نسخ النص المزخرف!");
        }

        render();
    </script>
</body>
</html>
