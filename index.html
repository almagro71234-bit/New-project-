<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost AI | المنصة الشاملة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; }
        .ai-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .style-btn { transition: all 0.3s; border: 2px solid transparent; cursor: pointer; opacity: 0.8; }
        .style-btn.active { border-color: #06b6d4; background: rgba(6, 182, 212, 0.2); transform: scale(1.05); opacity: 1; }
        .logo-container { background: white; border-radius: 2rem; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; }
        .server-badge { position: absolute; top: 10px; right: 10px; font-size: 10px; padding: 4px 8px; border-radius: 10px; background: #06b6d4; color: white; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #06b6d4; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="max-w-md w-full space-y-6 mt-4">
        <header class="text-center">
            <h1 class="text-3xl font-bold text-cyan-400">BrandBoost AI Pro 🤖</h1>
            <p class="text-slate-400 text-xs">نظام التصميم متعدد السيرفرات لضمان الجودة</p>
        </header>

        <div class="ai-card p-6 rounded-3xl space-y-5 shadow-2xl">
            <input type="text" id="brandInput" placeholder="اكتب اسم مشروعك (يفضل بالإنجليزية)..." 
                class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 outline-none text-center text-xl text-white focus:border-cyan-500 transition-colors">
            
            <p class="text-xs text-slate-400 text-center font-bold">اختر نمط الهوية:</p>
            <div class="grid grid-cols-2 gap-3" id="styleSelector">
                <button onclick="selectStyle(this, 'minimalist')" class="style-btn active bg-slate-800 p-4 rounded-2xl text-sm flex flex-col items-center gap-1">
                    <span>✨</span><span>بسيط وعصري</span>
                </button>
                <button onclick="selectStyle(this, 'tech')" class="style-btn bg-slate-800 p-4 rounded-2xl text-sm flex flex-col items-center gap-1">
                    <span>💻</span><span>تقني رقمي</span>
                </button>
                <button onclick="selectStyle(this, 'luxury')" class="style-btn bg-slate-800 p-4 rounded-2xl text-sm flex flex-col items-center gap-1">
                    <span>👑</span><span>فاخر وذهبي</span>
                </button>
                <button onclick="selectStyle(this, 'badge')" class="style-btn bg-slate-800 p-4 rounded-2xl text-sm flex flex-col items-center gap-1">
                    <span>🛡️</span><span>شارة رسمية</span>
                </button>
            </div>

            <button onclick="generateLogo()" id="aiBtn"
                class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95 text-lg">
                توليد بالذكاء الاصطناعي 🚀
            </button>
        </div>

        <div id="loading" class="hidden text-center space-y-4 py-8">
            <div class="loader"></div>
            <p id="loadingText" class="text-cyan-400 text-sm animate-pulse font-bold">جاري الاتصال بالسيرفر 1...</p>
        </div>

        <div id="results" class="hidden space-y-8 pb-16">
            <div class="logo-container">
                <div id="serverLabel" class="server-badge">Server 1</div>
                <img id="aiImage" src="" class="w-full h-full object-contain rounded-xl min-h-[300px]">
            </div>
            
            <div class="text-center space-y-3">
                <p class="text-slate-400 text-xs">تم إنشاء هذا الشعار خصيصاً لـ <span id="resName" class="text-cyan-400"></span></p>
                <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-700 px-8 py-2 rounded-full text-xs border border-slate-700 transition">تصدير التصميم 📥</button>
            </div>
        </div>
    </div>

    <script>
        let selectedStyle = 'minimalist';

        function selectStyle(btn, style) {
            document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedStyle = style;
        }

        async function generateLogo() {
            const name = document.getElementById('brandInput').value;
            if(!name) return alert('من فضلك أدخل الاسم أولاً!');

            const btn = document.getElementById('aiBtn');
            const results = document.getElementById('results');
            const img = document.getElementById('aiImage');
            const loading = document.getElementById('loading');
            const loadingText = document.getElementById('loadingText');
            const serverLabel = document.getElementById('serverLabel');

            btn.disabled = true;
            loading.classList.remove('hidden');
            results.classList.add('hidden');

            const seed = Math.floor(Math.random() * 999999);
            const encodedName = encodeURIComponent(name);

            // إعدادات الأنماط (Prompts)
            const stylePrompts = {
                minimalist: `Professional_Minimalist_Vector_Logo_for_"${encodedName}"_flat_design_white_background`,
                tech: `Cyber_HighTech_Digital_Logo_for_"${encodedName}"_neon_blue_white_background`,
                luxury: `Premium_Elegant_Gold_Logo_for_"${encodedName}"_royal_identity_white_background`,
                badge: `Vintage_Heraldic_Shield_Badge_Logo_for_"${encodedName}"_white_background`
            };

            // قائمة السيرفرات المتعددة
            const servers = [
                `https://image.pollinations.ai/prompt/${stylePrompts[selectedStyle]}?seed=${seed}&width=1024&height=1024&model=flux&nologo=true`,
                `https://image.pollinations.ai/prompt/${stylePrompts[selectedStyle]}_modern_hq?seed=${seed+1}&width=1024&height=1024&nologo=true`,
                `https://api.readyplayer.me/v1/avatars/placeholder.png?name=${encodedName}`, // سيرفر احتياطي 1
                `https://ui-avatars.com/api/?name=${encodedName}&background=0ea5e9&color=fff&size=1024&bold=true` // سيرفر احتياطي 2
            ];

            let currentIdx = 0;

            function tryServer() {
                if (currentIdx < servers.length) {
                    loadingText.innerText = `جاري المحاولة مع السيرفر ${currentIdx + 1}...`;
                    serverLabel.innerText = `Server ${currentIdx + 1}`;
                    img.src = servers[currentIdx];
                    currentIdx++;
                } else {
                    alert('جميع المحركات مشغولة حالياً، يرجى المحاولة لاحقاً.');
                    btn.disabled = false;
                    loading.classList.add('hidden');
                }
            }

            tryServer();

            img.onload = () => {
                loading.classList.add('hidden');
                results.classList.remove('hidden');
                document.getElementById('resName').innerText = name;
                btn.disabled = false;
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };

            img.onerror = () => {
                console.warn(`فشل السيرفر ${currentIdx}`);
                tryServer();
            };
        }
    </script>
</body>
</html>
