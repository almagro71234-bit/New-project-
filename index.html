<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost Studio Pro | الإصدار الملكي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@900&family=Amiri:wght@700&family=Reem+Kufi:wght@700&family=Aref+Ruqaa:wght@700&family=Lalezar&family=Vibes&family=Lemonada:wght@700&family=Changa:wght@800&family=Tajawal:wght@900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #010409; color: white; margin: 0; }
        .control-card { background: rgba(13, 17, 23, 0.98); border: 1px solid #30363d; border-radius: 2rem; }
        #canvas { width: 100%; min-height: 550px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 2.5rem; position: relative; overflow: hidden; }
        .bg-grid { background-image: radial-gradient(#d1d5db 1px, transparent 1px); background-size: 20px 20px; background-color: #ffffff; }
        .gold-text { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fcf6ba, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .silver-text { background: linear-gradient(to right, #70706f, #e2e2e1, #70706f, #e2e2e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input[type="range"] { accent-color: #22d3ee; }
    </style>
</head>
<body class="p-4 lg:p-10">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
        <div class="lg:col-span-5 space-y-4">
            <div class="control-card p-8 shadow-2xl">
                <h2 class="text-2xl font-black text-cyan-400 mb-6 flex items-center gap-2">💎 استوديو التصميم المتكامل</h2>
                
                <div class="space-y-4">
                    <input type="text" id="brandText" oninput="render()" placeholder="الاسم الرئيسي..." class="w-full p-4 rounded-xl bg-black border border-slate-800 outline-none text-cyan-400 font-bold text-center">
                    <input type="text" id="sloganText" oninput="render()" placeholder="نص فرعي (Slogan)..." class="w-full p-3 rounded-xl bg-slate-900 border border-slate-800 outline-none text-slate-400 text-sm text-center">

                    <div class="grid grid-cols-2 gap-3">
                        <select id="fontSelect" onchange="render()" class="p-3 rounded-xl bg-slate-900 border border-slate-700 text-xs outline-none">
                            <option value="'Aref Ruqaa'">خط الرقعة</option>
                            <option value="'Lalezar'">خط لاليزار</option>
                            <option value="'Reem Kufi'">الخط الكوفي</option>
                            <option value="'Lemonada'">خط ليمونادة</option>
                            <option value="'Vibes'">توقيع يدوي</option>
                        </select>
                        <select id="iconSelect" onchange="render()" class="p-3 rounded-xl bg-slate-900 border border-slate-700 text-xs outline-none">
                            <option value="">بدون رمز</option>
                            <option value="👑">👑 تاج</option>
                            <option value="💎">💎 ألماس</option>
                            <option value="🚀">🚀 انطلاق</option>
                            <option value="✒️">✒️ ريشة</option>
                        </select>
                    </div>

                    <div class="p-4 bg-slate-900/50 rounded-2xl">
                        <div class="flex justify-between items-center mb-2">
                            <label class="text-[10px] font-bold text-slate-400">الألوان الملكية والحجم:</label>
                            <div class="flex gap-2">
                                <button onclick="setColor('gold')" class="w-6 h-6 rounded-full bg-gradient-to-tr from-yellow-700 to-yellow-200 border border-yellow-500" title="ذهبي"></button>
                                <button onclick="setColor('silver')" class="w-6 h-6 rounded-full bg-gradient-to-tr from-slate-600 to-slate-100 border border-slate-400" title="فضي"></button>
                                <input type="color" id="mainColor" oninput="render()" value="#0ea5e9" class="w-6 h-6 bg-transparent cursor-pointer">
                            </div>
                        </div>
                        <input type="range" id="fontSize" oninput="render()" min="40" max="180" value="90" class="w-full h-2 rounded-lg appearance-none bg-slate-800">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <select id="effectSelect" onchange="render()" class="p-3 bg-slate-900 border border-slate-700 rounded-xl text-xs">
                            <option value="none">عادي</option>
                            <option value="glow">إشعاع (Glow)</option>
                            <option value="outline">مفرغ (Outline)</option>
                        </select>
                        <select id="bgSelect" onchange="render()" class="p-3 bg-slate-900 border border-slate-700 rounded-xl text-xs">
                            <option value="white">أبيض</option>
                            <option value="transparent">شفاف ✨</option>
                            <option value="linear-gradient(45deg, #0f172a, #1e293b)">أسود ملكي</option>
                        </select>
                    </div>
                </div>

                <div class="mt-8 space-y-3 pt-6 border-t border-slate-800">
                    <button onclick="downloadPNG()" class="w-full bg-cyan-600 hover:bg-cyan-500 p-4 rounded-2xl font-black text-lg shadow-xl transition-all active:scale-95">تنزيل الهوية (PNG) 📥</button>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="window.print()" class="bg-slate-800 p-3 rounded-xl text-xs font-bold border border-slate-700">حفظ PDF</button>
                        <button onclick="copyToClipboard()" class="bg-slate-800 p-3 rounded-xl text-xs font-bold border border-slate-700">نسخ النص</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-7 flex flex-col items-center">
            <div id="canvas" class="bg-white shadow-2xl">
                <div id="captureArea" class="flex flex-col items-center p-16 text-center">
                    <span id="iconDisplay" class="text-8xl mb-4 transition-all"></span>
                    <span id="textDisplay" class="font-black leading-none transition-all">الاسم</span>
                    <span id="sloganDisplay" class="mt-4 text-2xl font-medium tracking-widest opacity-80" style="font-family: 'Cairo';"></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'color';
        function setColor(m) { currentMode = m; render(); }

        function render() {
            const text = document.getElementById('brandText').value || "الاسم";
            const slogan = document.getElementById('sloganText').value || "";
            const font = document.getElementById('fontSelect').value;
            const icon = document.getElementById('iconSelect').value;
            const size = document.getElementById('fontSize').value;
            const color = document.getElementById('mainColor').value;
            const bg = document.getElementById('bgSelect').value;
            const effect = document.getElementById('effectSelect').value;

            const tD = document.getElementById('textDisplay');
            const sD = document.getElementById('sloganDisplay');
            const iD = document.getElementById('iconDisplay');
            const cv = document.getElementById('canvas');

            tD.innerText = text; tD.style.fontFamily = font; tD.style.fontSize = size + "px";
            sD.innerText = slogan; iD.innerText = icon;

            tD.className = "font-black leading-none " + (currentMode === 'gold' ? 'gold-text' : (currentMode === 'silver' ? 'silver-text' : ''));
            iD.className = "text-8xl mb-4 " + (currentMode === 'gold' ? 'gold-text' : (currentMode === 'silver' ? 'silver-text' : ''));

            if(currentMode === 'color') { tD.style.webkitTextFillColor = color; iD.style.color = color; }

            cv.className = bg === 'transparent' ? "bg-grid shadow-2xl" : "shadow-2xl";
            cv.style.background = bg === 'transparent' ? "" : (bg.includes('gradient') ? bg : "#ffffff");

            tD.style.textShadow = effect === 'glow' ? `0 0 20px ${color}` : "none";
            tD.style.webkitTextStroke = effect === 'outline' ? `2px ${color}` : "0px";
            if(effect === 'outline') tD.style.webkitTextFillColor = "transparent";
        }

        async function downloadPNG() {
            const el = document.getElementById('canvas');
            const bg = document.getElementById('bgSelect').value;
            if(bg === 'transparent') { el.className = ""; el.style.background = "transparent"; }
            const res = await html2canvas(el, { backgroundColor: null, scale: 4 });
            const link = document.createElement('a');
            link.download = `Design_Pro.png`; link.href = res.toDataURL(); link.click();
            render();
        }

        function copyToClipboard() {
            const val = document.getElementById('brandText').value || "الاسم";
            navigator.clipboard.writeText(`亗 ${val} 亗`); alert("تم نسخ النص بنجاح!");
        }

        document.getElementById('mainColor').oninput = () => { currentMode = 'color'; render(); };
        render();
    </script>
</body>
</html>
