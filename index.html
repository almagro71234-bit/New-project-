<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost AI | ابتكار الهوية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .fade-in { animation: fadeIn 0.8s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="gradient-bg text-white min-h-screen flex flex-col items-center p-6">

    <div class="max-w-2xl w-full text-center space-y-8 mt-6">
        <h1 class="text-5xl font-extrabold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent italic">BrandBoost AI</h1>
        
        <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700 backdrop-blur-md shadow-2xl">
            <div class="space-y-4">
                <input type="text" id="brandName" placeholder="اكتب تخصصك (قهوة، تقنية، فن)..." 
                    class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-cyan-500 outline-none text-center text-xl transition-all shadow-inner">
                <button onclick="generateBranding()" 
                    class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-4 rounded-2xl transition-all shadow-lg active:scale-95 text-lg">
                    ابتكار الهوية الآن ✨
                </button>
            </div>

            <div id="resultArea" class="hidden mt-8 space-y-6 text-right fade-in">
                <div class="rounded-2xl overflow-hidden border-2 border-slate-600 shadow-2xl relative h-64 bg-slate-900">
                    <img id="brandImage" src="" alt="Brand Preview" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 to-transparent flex items-end p-4">
                        <p class="text-sm font-light text-gray-300">نموذج هوية بصرية لـ <span id="dynamicName" class="text-cyan-400 font-bold"></span></p>
                    </div>
                </div>

                <div class="grid grid-cols-1 gap-4">
                    <div class="bg-slate-900/80 p-5 rounded-2xl border border-slate-700">
                        <span class="text-cyan-400 text-sm block mb-2 font-bold">💡 فكرة التصميم</span>
                        <p id="logoIdea" class="text-gray-200 leading-relaxed"></p>
                    </div>
                    <div class="bg-slate-900/80 p-5 rounded-2xl border border-slate-700 text-center">
                        <span class="text-yellow-400 text-sm block mb-2 font-bold">📝 الشعار اللفظي</span>
                        <p id="sloganText" class="text-white text-xl font-bold italic"></p>
                    </div>
                </div>

                <button onclick="shareOnWhatsApp()" 
                    class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg">
                    <span>مشاركة النتيجة عبر واتساب</span>
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.94 3.659 1.437 5.634 1.437h.005c6.558 0 11.894-5.335 11.897-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        function generateBranding() {
            const name = document.getElementById('brandName').value;
            if(!name) return alert('يرجى إدخال تخصص مشروعك!');

            const resultArea = document.getElementById('resultArea');
            const brandImage = document.getElementById('brandImage');
            
            // جلب صورة تناسب النص المكتوب
            brandImage.src = `https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&q=80&w=800`; // صورة افتراضية
            brandImage.src = `https://source.unsplash.com/800x600/?${encodeURIComponent(name)},modern`;

            document.getElementById('dynamicName').innerText = name;
            document.getElementById('logoIdea').innerText = `تصميم يعتمد على مبدأ "الوضوح البصري" مع دمج عناصر مستوحاة من مجال "${name}" بأسلوب حديث ومبتكر.`;
            document.getElementById('sloganText').innerText = `"${name}: التميز في كل تفصيلة"`;

            resultArea.classList.remove('hidden');
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }

        function shareOnWhatsApp() {
            const name = document.getElementById('brandName').value;
            const slogan = document.getElementById('sloganText').innerText;
            const text = `لقد صممت هوية بصرية لمشروعي الجديد "${name}" باستخدام BrandBoost AI! ✨\nالشعار اللفظي: ${slogan}\n\nجرب التطبيق هنا: ${window.location.href}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
