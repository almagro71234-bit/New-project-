<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost AI | مولد الهوية والملصقات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; color: white; margin: 0; padding: 0; }
        .sticker-frame {
            width: 180px; height: 180px;
            border-radius: 50%;
            border: 8px solid white; /* الحدود البيضاء للملصق */
            background: linear-gradient(135deg, #0891b2, #1d4ed8);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin: 20px auto;
            animation: bounce 2s infinite;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <div class="max-w-md w-full text-center space-y-8">
        <h1 class="text-4xl font-bold text-cyan-400">BrandBoost AI</h1>
        
        <div class="bg-slate-800 p-6 rounded-3xl shadow-2xl border border-slate-700">
            <input type="text" id="userInput" placeholder="اكتب اسم مشروعك هنا..." 
                class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-600 focus:outline-none focus:border-cyan-500 text-center text-xl mb-4 text-white">
            
            <button onclick="startGeneration()" id="actionBtn"
                class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-4 rounded-2xl transition-all">
                توليد الهوية والملصق 🚀
            </button>
        </div>

        <div id="loading" class="hidden text-cyan-400 animate-pulse">جاري التصميم...</div>

        <div id="results" class="hidden space-y-8 pb-10">
            <div class="rounded-3xl overflow-hidden border-4 border-slate-700">
                <img id="mainImg" src="" class="w-full h-auto">
            </div>

            <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700">
                <h3 class="text-xl font-bold text-cyan-400 mb-4">ملصقك الاحترافي ✨</h3>
                <div class="sticker-frame">
                    <span id="stickerLabel" class="text-white font-bold text-2xl"></span>
                </div>
                <button onclick="alert('سيكون التحميل متاحاً فور الاتصال بالسيرفر')" class="mt-6 text-sm text-slate-400 underline">تحميل الملصق PNG</button>
            </div>
        </div>
    </div>

    <script>
        function startGeneration() {
            const val = document.getElementById('userInput').value;
            if(!val) { alert('من فضلك ادخل اسماً'); return; }

            const btn = document.getElementById('actionBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const img = document.getElementById('mainImg');
            const label = document.getElementById('stickerLabel');

            btn.disabled = true;
            loading.classList.remove('hidden');
            results.classList.add('hidden');

            const randomSeed = Math.floor(Math.random() * 10000);
            img.src = `https://picsum.photos/seed/${randomSeed}/800/800`;

            img.onload = function() {
                loading.classList.add('hidden');
                results.classList.remove('hidden');
                label.innerText = val;
                btn.disabled = false;
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            };
        }
    </script>
</body>
</html>
