<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrandBoost AI | النسخة السريعة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #0f172a; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .loading-bar { height: 4px; width: 0%; background: #06b6d4; transition: width 0.3s; }
    </style>
</head>
<body class="text-white min-h-screen p-4 flex flex-col items-center">

    <div class="max-w-xl w-full space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-bold text-cyan-400">BrandBoost AI 🤖</h1>
            <p class="text-slate-400 text-sm">توليد فوري للهوية البصرية</p>
        </header>

        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
            <input type="text" id="brandName" placeholder="اكتب اسم مشروعك هنا..." 
                class="w-full p-4 rounded-xl bg-slate-900 border border-slate-600 focus:border-cyan-500 outline-none text-center mb-4">
            
            <button onclick="generateFastAI()" id="btnText"
                class="w-full bg-cyan-600 hover:bg-cyan-500 py-4 rounded-xl font-bold transition-all active:scale-95">
                توليد التصميم الآن 🚀
            </button>
            <div id="progress" class="loading-bar mt-2 rounded-full"></div>
        </div>

        <div id="resultArea" class="hidden space-y-4 fade-in">
            <div class="relative rounded-2xl overflow-hidden border-2 border-slate-700 h-72 bg-slate-900">
                <img id="brandImage" class="w-full h-full object-cover shadow-2xl">
            </div>
            
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700">
                <p id="aiSlogan" class="text-center text-xl font-bold text-cyan-300"></p>
            </div>
        </div>
    </div>

    <script>
        function generateFastAI() {
            const name = document.getElementById('brandName').value;
            const btn = document.getElementById('btnText');
            const progress = document.getElementById('progress');
            const img = document.getElementById('brandImage');
            const result = document.getElementById('resultArea');

            if(!name) return alert('يرجى كتابة الاسم!');

            // بدء التحميل
            btn.disabled = true;
            btn.innerText = 'جاري المعالجة السريعة...';
            progress.style.width = '70%';

            // توليد معرف عشوائي لكسر التخزين المؤقت
            const seed = Math.floor(Math.random() * 1000);
            
            // استخدام رابط فائق السرعة يعتمد على اسم المشروع
            const fastImageUrl = `https://image.pollinations.ai/prompt/professional-logo-minimalist-for-${encodeURIComponent(name)}-vector-flat-design?seed=${seed}&width=800&height=800&nologo=true`;

            img.src = fastImageUrl;

            img.onload = () => {
                progress.style.width = '100%';
                btn.disabled = false;
                btn.innerText = 'توليد التصميم الآن 🚀';
                result.classList.remove('hidden');
                document.getElementById('aiSlogan').innerText = `${name} | التميز في كل تفصيل`;
                
                setTimeout(() => progress.style.width = '0%', 500);
            };

            // في حال تأخر السيرفر أكثر من 10 ثواني، استخدم البديل
            img.onerror = () => {
                img.src = `https://source.unsplash.com/800x800/?logo,${name}`;
            };
        }
    </script>
</body>
</html>
